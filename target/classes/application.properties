# ================================================
# SoulSync - Application Configuration
# ================================================

# Server
server.port=8080
server.servlet.context-path=/api

# Database - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/soulsync_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=SoulSync_SuperSecret_JWT_Key_2024_MustBe256BitsLongForHS256Algorithm
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=./uploads

# Email (Configure with real SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.datasource.url=jdbc:mysql://localhost:3306/soulsync_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# Logging
logging.level.com.soulsync=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
spring.web.resources.add-mappings=true
spring.mvc.throw-exception-if-no-handler-found=false
