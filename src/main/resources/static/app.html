<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulSync</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💞</text></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Navbar -->
    <nav class="navbar" id="navbar"></nav>

    <!-- Mobile overlay -->
    <div id="mobile-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.style.display='none'"></div>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <div id="content">
        <div class="page-container">
          <div class="empty-state">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toast-root"></div>

  <!-- WebSocket libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.init();
    });
  </script>
</body>
</html>
